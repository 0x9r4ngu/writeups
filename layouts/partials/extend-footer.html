<script>
(function () {
  'use strict';

  /* ── 1. Staggered scroll reveal for cards ─────────────────────── */
  var cards = document.querySelectorAll('.article-link--card');
  if (cards.length && 'IntersectionObserver' in window) {
    cards.forEach(function (card, i) {
      card.classList.add('reveal');
      card.style.transitionDelay = Math.min(i * 65, 320) + 'ms';
    });

    var revealObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.07, rootMargin: '0px 0px -30px 0px' });

    cards.forEach(function (card) { revealObserver.observe(card); });
  }

  /* ── 2. Active nav link highlight ─────────────────────────────── */
  var currentPath = window.location.pathname.replace(/\/$/, '');
  var navRoot = document.querySelector('.site-nav') || document.querySelector('nav');
  if (navRoot) {
    navRoot.querySelectorAll('a[href]').forEach(function (link) {
      var href = (link.getAttribute('href') || '').replace(/\/$/, '');
      if (href && href !== '' && currentPath.startsWith(href)) {
        link.querySelectorAll('span').forEach(function (s) { s.style.color = 'var(--accent)'; });
        link.style.color = 'var(--accent)';
      }
    });
  }

  /* ── 3. Typing effect on profile headline ─────────────────────── */
  var headline = document.querySelector('article.flex.flex-col.items-center h2');
  if (headline) {
    var original = headline.textContent.trim();
    if (original.length > 0) {
      headline.textContent = '';
      var idx = 0;
      var typingTimer = setInterval(function () {
        if (idx < original.length) { headline.textContent += original[idx++]; }
        else { clearInterval(typingTimer); }
      }, 42);
    }
  }

  /* ── 5. Mobile menu overlay bg ──────────────────────────────── */
  var mobileOverlay = document.querySelector('.fixed.inset-0.invisible');
  if (mobileOverlay && document.documentElement.classList.contains('dark')) {
    mobileOverlay.style.backgroundColor = 'rgba(9,11,18,0.98)';
  }

  /* ── 6. Image lightbox — click article images to zoom ─────────── */
  var artImgs = document.querySelectorAll('.prose img');
  if (artImgs.length) {
    var ov = document.createElement('div');
    ov.id = 'lightbox-overlay';
    ov.innerHTML =
      '<button id="lightbox-close" aria-label="Close (Esc)">&times;</button>' +
      '<img id="lightbox-img" alt="">' +
      '<div id="lightbox-caption"></div>';
    document.body.appendChild(ov);

    var lbImg = ov.querySelector('#lightbox-img');
    var lbCap = ov.querySelector('#lightbox-caption');

    function cleanAlt(a) {
      if (!a) return '';
      a = a.trim();
      // Migrated posts sometimes use the file path as alt text — hide those.
      if (/assets\/|\.(png|jpe?g|gif|webp|svg)$/i.test(a)) return '';
      return a;
    }
    function openLb(src, alt) {
      lbImg.src = src;
      var c = cleanAlt(alt);
      lbImg.alt = c;
      lbCap.textContent = c;
      lbCap.style.display = c ? '' : 'none';
      ov.classList.remove('zoomed');
      ov.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      ov.classList.remove('open', 'zoomed');
      document.body.style.overflow = '';
    }

    artImgs.forEach(function (im) {
      im.addEventListener('click', function (e) {
        e.preventDefault();
        openLb(im.currentSrc || im.src, im.getAttribute('alt'));
      });
    });

    // Click image: toggle fit <-> actual-size (pan). Click backdrop: close.
    lbImg.addEventListener('click', function (e) {
      e.stopPropagation();
      ov.classList.toggle('zoomed');
    });
    ov.addEventListener('click', closeLb);
    ov.querySelector('#lightbox-close').addEventListener('click', function (e) {
      e.stopPropagation();
      closeLb();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && ov.classList.contains('open')) closeLb();
    });
  }

})();
</script>
